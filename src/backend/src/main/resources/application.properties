spring.application.name=backend
spring.config.import=optional:file:.env[.properties]

spring.datasource.url=jdbc:postgresql://localhost:5432/journi_prim_db
spring.datasource.username=postgres
spring.datasource.password=password
spring.jpa.hibernate.ddl-auto=update
spring.datasource.driver-class-name=org.postgresql.Driver

spring.data.redis.host=localhost
spring.data.redis.port=6379

security.jwt.secret-key=${JWT_SECRET_KEY}
security.auth.access-token-lifetime=${ACCESS_TOKEN_LIFETIME:PT15M}
security.auth.refresh-token-lifetime=${REFRESH_TOKEN_LIFETIME:P30D}
security.auth.refresh-cookie.name=${REFRESH_COOKIE_NAME:journi_refresh}
security.auth.refresh-cookie.path=/api/v1/auth
security.auth.refresh-cookie.secure=${REFRESH_COOKIE_SECURE:false}
security.auth.refresh-cookie.same-site=${REFRESH_COOKIE_SAME_SITE:Lax}
security.auth.csrf.cookie-name=${CSRF_COOKIE_NAME:journi_csrf}
security.auth.csrf.header-name=${CSRF_HEADER_NAME:X-CSRF-TOKEN}
security.auth.allowed-origins=${FRONTEND_ALLOWED_ORIGINS}

journi.seed.roadmaps.enabled=false
journi.seed.roadmaps.dataset-location=classpath:seed-data/backend-java-spring-roadmap.json
journi.seed.roadmaps.exit-after-run=false
