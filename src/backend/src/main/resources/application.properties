spring.application.name=backend
spring.config.import=optional:file:.env[.properties]

spring.datasource.url=jdbc:postgresql://localhost:5432/journi_prim_db
spring.datasource.username=postgres
spring.datasource.password=password
spring.jpa.hibernate.ddl-auto=update
spring.datasource.driver-class-name=org.postgresql.Driver

spring.data.redis.host=localhost
spring.data.redis.port=6379

security.jwt.secret-key=${JWT_SECRET_KEY}
security.auth.access-token-lifetime=${ACCESS_TOKEN_LIFETIME:PT15M}
security.auth.refresh-token-lifetime=${REFRESH_TOKEN_LIFETIME:P30D}
security.auth.refresh-cookie.name=${REFRESH_COOKIE_NAME:journi_refresh}
security.auth.refresh-cookie.path=/api/v1/auth
security.auth.refresh-cookie.secure=${REFRESH_COOKIE_SECURE:false}
security.auth.refresh-cookie.same-site=${REFRESH_COOKIE_SAME_SITE:Lax}
security.auth.csrf.cookie-name=${CSRF_COOKIE_NAME:journi_csrf}
security.auth.csrf.header-name=${CSRF_HEADER_NAME:X-CSRF-TOKEN}
# IMPORTANT: origins must be configured in .env file first
security.auth.allowed-origins=${FRONTEND_ALLOWED_ORIGINS}

journi.seed.roadmaps.enabled=false
journi.seed.roadmaps.dataset-location=classpath:seed-data/backend-java-spring-roadmap.json
journi.seed.roadmaps.exit-after-run=false

practice.submission.stream=${PRACTICE_SUBMISSION_STREAM:practice-submissions}
practice.submission.enabled=${PRACTICE_SUBMISSIONS_ENABLED:false}
practice.submission.consumer-group=${PRACTICE_SUBMISSION_CONSUMER_GROUP:practice-graders}
practice.submission.poll-delay-ms=${PRACTICE_SUBMISSION_POLL_DELAY_MS:1000}
practice.submission.recovery-delay-ms=${PRACTICE_SUBMISSION_RECOVERY_DELAY_MS:60000}
practice.grader.workspace-root=${PRACTICE_GRADER_WORKSPACE_ROOT:${java.io.tmpdir}/journi-grader}
practice.grader.assets-path=${PRACTICE_GRADER_ASSETS_PATH:src/main/resources/grader}
practice.grader.clone-timeout=${PRACTICE_GRADER_CLONE_TIMEOUT:PT1M}
practice.grader.lease-duration=${PRACTICE_GRADER_LEASE_DURATION:PT10M}
practice.grader.max-repository-bytes=${PRACTICE_GRADER_MAX_REPOSITORY_BYTES:52428800}
practice.grader.max-output-bytes=${PRACTICE_GRADER_MAX_OUTPUT_BYTES:32768}
practice.grader.max-result-bytes=${PRACTICE_GRADER_MAX_RESULT_BYTES:65536}
practice.grader.cpus=${PRACTICE_GRADER_CPUS:1.0}
practice.grader.memory=${PRACTICE_GRADER_MEMORY:768m}
practice.grader.pids-limit=${PRACTICE_GRADER_PIDS_LIMIT:128}
practice.grader.concurrency=${PRACTICE_GRADER_CONCURRENCY:1}
