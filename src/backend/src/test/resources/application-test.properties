# Test DB for test profile
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop

# Fake secret key for tests
security.jwt.secret-key=MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
security.auth.access-token-lifetime=PT15M
security.auth.refresh-token-lifetime=P30D
security.auth.refresh-cookie.name=journi_refresh
security.auth.refresh-cookie.path=/api/v1/auth
security.auth.refresh-cookie.secure=false
security.auth.refresh-cookie.same-site=Lax
security.auth.csrf.cookie-name=journi_csrf
security.auth.csrf.header-name=X-CSRF-TOKEN
security.auth.allowed-origins=http://localhost:3000
