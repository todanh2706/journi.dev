name: journi

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: journi_frontend
    ports:
      - "3000:3000"
    env_file: ./frontend/.env
    environment:
      - CHOKIDAR_USEPOLLING=true
    restart: always
    volumes:
      - ./frontend:/app
      - /app/node_modules

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: journi_backend
    ports:
      - "8000:8080"
    env_file: ./backend/.env
    environment:
      - SPRING_DATASOURCE_URL=${SPRING_DB_URL}
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SPRING_DATA_REDIS_HOST=${REDIS_HOST}
      - SPRING_DATA_REDIS_PORT=${REDIS_PORT}
    depends_on:
      - database
      - cache
    restart: always
    volumes:
      - ./backend:/app
      - ~/.m2:/root/.m2

  grader:
    build:
      context: ./backend
      dockerfile: Dockerfile.grader
    container_name: journi_grader
    environment:
      - SPRING_PROFILES_ACTIVE=grader
      - SPRING_MAIN_WEB_APPLICATION_TYPE=none
      - SPRING_DATASOURCE_URL=${SPRING_DB_URL}
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SPRING_DATA_REDIS_HOST=${REDIS_HOST}
      - SPRING_DATA_REDIS_PORT=${REDIS_PORT}
      - JWT_SECRET_KEY=${GRADER_BOOTSTRAP_SECRET}
      - FRONTEND_ALLOWED_ORIGINS=http://localhost
      - PRACTICE_GRADER_WORKSPACE_ROOT=${PWD}/.grader-workspaces
      - PRACTICE_GRADER_ASSETS_PATH=${PWD}/backend/src/main/resources/grader
    depends_on:
      - database
      - cache
    restart: always
    volumes:
      - ./backend:/app
      - ~/.m2:/root/.m2
      - /var/run/docker.sock:/var/run/docker.sock
      - ${PWD}/.grader-workspaces:${PWD}/.grader-workspaces
      - ${PWD}/backend/src/main/resources/grader:${PWD}/backend/src/main/resources/grader:ro

  database:
    image: postgres:16
    container_name: journi_prim_db
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - journi_prim_db:/var/lib/postgresql/data
    restart: always
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}

  cache:
    image: redis:7
    container_name: journi_cache_db
    env_file: .env
    ports:
      - "6379:6379"
    volumes:
      - journi_cache_db:/data
    restart: always

volumes:
  journi_prim_db:
  journi_cache_db:
